services:
  agent-wechat:
    image: ghcr.io/thisnick/agent-wechat:latest
    container_name: tomeet-agent-wechat
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    ports:
      - "6174:6174"
    volumes:
      - agent-wechat-data:/data
      - agent-wechat-home:/home/wechat
      - type: bind
        source: ${AGENT_WECHAT_TOKEN_FILE:?Set AGENT_WECHAT_TOKEN_FILE}
        target: /data/auth-token
        read_only: true
    environment:
      PROXY: ${WECHAT_PROXY:-}
    restart: unless-stopped

volumes:
  agent-wechat-data:
  agent-wechat-home:

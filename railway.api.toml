[build]
builder = "NIXPACKS"
buildCommand = "corepack pnpm install --frozen-lockfile && corepack pnpm --filter @tomeet/api... typecheck"

[deploy]
startCommand = "corepack pnpm --filter @tomeet/api start"
healthcheckPath = "/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
